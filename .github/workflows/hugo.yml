name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]

# Berechtigungen für das Deployment festlegen
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
        shell: bash

jobs:
  # Bau-Job
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.124.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install Dart Sass
        run: |
          curl -L https://github.com/sass/dart-sass/releases/download/1.71.1/dart-sass-1.71.1-linux-x64.tar.gz | tar -xzP
          echo "$(pwd)/dart-sass" >> $GITHUB_PATH
          # Ensure Hugo knows where to find it
          echo "HUGO_PARAMS_DART_SASS_BINARY=$(pwd)/dart-sass/dart-sass" >> $GITHUB_ENV

      - name: Install Hugo CLI
        run: |
          wget https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz
          tar -xzf hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz hugo
          sudo mv hugo /usr/local/bin/hugo

      - name: Build with Hugo
        env:
          # Ensure Hugo uses the embedded/binary version
          HUGO_PARAMS_DART_SASS_BINARY: $(pwd)/dart-sass/dart-sass
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        path: ./public

  # Deployment-Job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
